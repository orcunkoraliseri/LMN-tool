<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PV Generation profile visualization for neighbourhood configurations.">
    <title>PV Generation | Neighbourhood Design Interface</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1 id="neighbourhood-title">Layer 1: PV Generation Profile</h1>
        <!-- Energy indicators row: Energy Status + PV Scale -->
        <div class="energy-indicators-row">
            <div id="energy-status-container" class="energy-status-header"></div>
            <div id="pv-scale-container" class="eui-scale-container"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <a id="back-step-btn" href="layer1_energy_selection.html" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Energy Selection
            </a>
            <a id="next-step-btn" href="layer1_lpv_breakdown.html" class="next-button">
                Layer 2: Land-PV generation
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
        </div>

        <div class="sidebar-layout">
            <aside id="sidebar" class="sidebar"></aside>

            <div id="visual-content" class="main-content">
                <!-- PV Profile Content -->
                <div class="pv-profile-layout">
                    <!-- Left Column: Inputs and KPIs -->
                    <div class="pv-left-column">
                        <!-- Inputs Section -->
                        <div class="pv-section pv-inputs-section">

                            <!-- PV Surface -->
                            <div class="pv-input-bar">
                                <span class="pv-input-label">PV Surface:</span>
                                <span class="pv-input-value" id="pv-surface-val">Roof + Facade</span>
                            </div>

                            <!-- PV Efficiency -->
                            <div class="pv-input-bar">
                                <span class="pv-input-label">PV Efficiency:</span>
                                <span class="pv-input-value" id="pv-efficiency-val">18.65%</span>
                            </div>

                            <!-- PV Mounting -->
                            <div class="pv-input-bar">
                                <span class="pv-input-label">PV Mounting:</span>
                                <span class="pv-input-value" id="pv-mounting-val">Fixed Open Rack</span>
                            </div>

                            <!-- Ground Coverage Ratio -->
                            <div class="pv-input-bar">
                                <span class="pv-input-label">Ground Coverage Ratio:</span>
                                <span class="pv-input-value" id="pv-gcr-val">60%</span>
                            </div>
                        </div>

                        <!-- KPIs Section -->
                        <div class="pv-section pv-kpis-section">

                            <!-- Annual Generation -->
                            <div class="pv-kpi-item">
                                <h3 class="pv-kpi-label">PV Generation (kWh/m2)</h3>
                                <div class="pv-kpi-value" id="pv-generation-val">MWh/year</div>
                            </div>

                            <!-- Ratio of Performance -->
                            <div class="pv-kpi-item">
                                <h3 class="pv-kpi-label">Ratio of Performance (RoP)</h3>
                                <div class="pv-kpi-value" id="pv-rop-val">18.65%</div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Visualization -->
                    <div class="pv-right-column">
                        <div class="pv-section">

                            <!-- Solar Irradiation 3D Model -->
                            <div class="pv-chart-container">
                                <img id="solar-irradiation-img" src="Content/Images_PVProfile/Solar Irradiation.png"
                                    alt="Solar Irradiation 3D Model" class="pv-chart-image">
                            </div>

                            <!-- Monthly Solar Generation Chart -->
                            <div class="pv-chart-container">
                                <img id="monthly-generation-img"
                                    src="Content/Images_PVProfile/Monthly Solar Generation.png"
                                    alt="Monthly Profile of Solar Generation" class="pv-chart-image">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    </main>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/pv.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View compatible neighbourhood configurations based on your design parameters.">
    <title>Neighbourhood Results | Neighbourhood Design Interface</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1>Layer 1: Neighbourhood Results</h1>
        <p>Explore the compatible neighbourhood configurations referencing your selected parameters.</p>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <a href="layer1_NUs_selection.html" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Parameters
            </a>
            <button id="layer2-energy-btn" class="next-button" disabled>
                Layer 2: Energy Selection
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>

        <!-- Results Table -->
        <div class="table-container">
            <table class="results-table">
                <thead>
                    <tr>
                        <!-- <th>EUI</th> -->
                        <!-- <th>Energy Status</th> -->
                        <th>Concepts</th>
                        <th>Neighbourhoods</th>
                        <th>Properties</th>
                        <th>Buildings</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <!-- Results will be dynamically inserted here by app.js -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

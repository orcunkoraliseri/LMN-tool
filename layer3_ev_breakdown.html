<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EV Breakdown for neighbourhood configurations.">
    <title>EV Breakdown | Neighbourhood Design Interface</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1 id="neighbourhood-title">Layer 3: EV Breakdown</h1>
        <p>Explore the EV overview for the selected neighbourhood.</p>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <a id="back-step-btn" href="layer3_output_mobility.html" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Output
            </a>
        </div>

        <div class="sidebar-layout">
            <aside id="sidebar" class="sidebar"></aside>

            <div id="visual-content" class="main-content">
                <div style="padding: 2rem; text-align: center;">
                    <h3 style="margin-bottom: 2rem; color: #333; font-weight: 500;">EV Breakdown Content</h3>
                    <img src="Mockup/L3.png" alt="EV Breakdown Mockup"
                        style="max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const neighbourhoodCode = params.get('neighbourhood');
            if (neighbourhoodCode) {
                document.getElementById('neighbourhood-title').textContent = `Layer 3: EV Breakdown for ${neighbourhoodCode}`;
                document.getElementById('back-step-btn').href = `layer3_output_mobility.html?neighbourhood=${encodeURIComponent(neighbourhoodCode)}`;
                if (typeof buildSidebar === 'function') {
                    buildSidebar('layer3_output', 'visuals');
                }
            }
        });
    </script>
</body>

</html>

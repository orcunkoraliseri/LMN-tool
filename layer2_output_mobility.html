<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mobility parameters results for neighbourhood analysis.">
    <title>Mobility Results | Neighbourhood Design Interface</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1 id="neighbourhood-title">Layer 2: Mobility Selection Results</h1>
        <p>Confirm your mobility and transportation parameters before proceeding.</p>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <a id="back-btn" href="layer2_mobility_selection.html" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Layer 2 Selection
            </a>
            <a id="proceed-green-nav-btn" href="layer3_green_selection.html" class="next-button">
                Layer 3: Green Selection
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
        </div>

        <div class="sidebar-layout">
            <aside id="sidebar" class="sidebar"></aside>

            <div id="visual-content" class="main-content">
                <div class="output-placeholder"
                    style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; height: 100%;">
                    <h2 style="margin-bottom: 2rem; font-weight: 500; font-size: 1.5rem; color: #333;">Mobility profiles
                        applied successfully.</h2>
                    <p style="margin-bottom: 3rem; color: #666; font-size: 1.1rem;">Click on a
                        <strong>Transportation</strong> item in the left sidebar to view its detailed breakdown.
                    </p>
                    <div class="submit-section" style="display: none;">
                        <button id="proceed-green-btn" class="submit-btn"
                            style="background-color: var(--primary-color);">Proceed to Green Selection</button>
                    </div>
                </div>
            </div>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/output_mobility.js"></script>
</body>

</html>

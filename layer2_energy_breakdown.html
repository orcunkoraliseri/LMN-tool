<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Energy demand breakdown visualization for neighbourhood configurations.">
    <title>Energy Breakdown | Neighbourhood Design Interface</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1 id="neighbourhood-title">Layer 2: Energy Breakdown</h1>
        <p>Explore the energy usage breakdown for the selected neighbourhood.</p>
        <!-- Energy indicators row: Energy Status + EUI Scale -->
        <div class="energy-indicators-row">
            <div id="energy-status-container" class="energy-status-header"></div>
            <div id="eui-scale-container" class="eui-scale-container"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <a id="back-step-btn" href="layer2_energy_selection.html" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Energy Selection
            </a>
            <a id="next-step-btn" href="layer2_pv_breakdown.html" class="next-button">
                Layer 2: PV Generation
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
        </div>

        <div class="sidebar-layout">
            <aside id="sidebar" class="sidebar"></aside>

            <div id="visual-content" class="main-content">
                <!-- Treemap Container -->
                <div id="treemap-container" class="treemap-container">
                    <!-- Treemap rectangles will be generated by energy.js -->
                </div>

                <!-- Legend -->
                <div id="legend" class="treemap-legend">
                    <!-- Legend items will be generated by energy.js -->
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/energy.js"></script>
</body>

</html>

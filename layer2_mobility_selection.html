<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Select mobility parameters for neighbourhood analysis.">
    <title>Mobility Selection | Neighbourhood Design Interface</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1 id="neighbourhood-title">Layer 2: Mobility Selection</h1>
        <p>Select mobility and transportation parameters for your analysis.</p>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Navigation Back Button -->
        <a id="back-btn" href="layer1_output_energy.html" class="back-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Layer 1 Results
        </a>

        <div class="sidebar-layout">
            <aside id="sidebar" class="sidebar"></aside>

            <div id="visual-content" class="main-content">
                <!-- Parameters Section -->
                <section class="parameters-section" id="selection-form">

                    <!-- TRANSPORTATION -->
                    <div class="parameter-group">
                        <div class="parameter-label">Transportation</div>
                        <div class="generation-container">
                            <!-- Row 1 -->
                            <div class="generation-row">
                                <button class="generation-card transportation-card" data-category="transportation"
                                    data-value="ev">
                                    <img src="Content/Images_Layer2_Transportation/EV.png" alt="EV"
                                        onerror="this.src=''; this.style.backgroundColor='#e0e0e0'; this.style.minHeight='100px';">
                                    <span>EV</span>
                                </button>
                                <button class="generation-card transportation-card" data-category="transportation"
                                    data-value="ev_public_transport">
                                    <img src="Content/Images_Layer2_Transportation/EV Public Transport.png"
                                        alt="EV Public Transport"
                                        onerror="this.src=''; this.style.backgroundColor='#e0e0e0'; this.style.minHeight='100px';">
                                    <span>EV Public Transport</span>
                                </button>
                            </div>
                            <!-- Row 2 -->
                            <div class="generation-row">
                                <button class="generation-card transportation-card" data-category="transportation"
                                    data-value="ev_charging_stations">
                                    <img src="Content/Images_Layer2_Transportation/EV Charging Stations.png"
                                        alt="EV Charging Stations"
                                        onerror="this.src=''; this.style.backgroundColor='#e0e0e0'; this.style.minHeight='100px';">
                                    <span>EV Charging Stations</span>
                                </button>
                                <button class="generation-card transportation-card" data-category="transportation"
                                    data-value="v2g_stations">
                                    <img src="Content/Images_Layer2_Transportation/V2G Stations.png" alt="V2G Stations"
                                        onerror="this.src=''; this.style.backgroundColor='#e0e0e0'; this.style.minHeight='100px';">
                                    <span>V2G Stations</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- MOBILITY -->
                    <div class="parameter-group">
                        <div class="parameter-label">Mobility</div>
                        <div class="consumption-cards">
                            <button class="consumption-card mobility-card" data-category="mobility"
                                data-value="bicycle_infrastructure">
                                <img src="Content/Images_Layer2_Mobility/Bicycle Infrastructure.png"
                                    alt="Bicycle Infrastructure"
                                    onerror="this.src=''; this.style.backgroundColor='#e0e0e0'; this.style.minHeight='80px';">
                                <span>Bicycle Infrastructure</span>
                            </button>
                            <button class="consumption-card mobility-card" data-category="mobility"
                                data-value="pedestrian_oriented_design">
                                <img src="Content/Images_Layer2_Mobility/Pedestrian-oriented design.png"
                                    alt="Pedestrian-oriented design"
                                    onerror="this.src=''; this.style.backgroundColor='#e0e0e0'; this.style.minHeight='80px';">
                                <span>Pedestrian-oriented design</span>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="submit-section">
                        <button id="view-mobility-btn" class="submit-btn">View Mobility Performance</button>
                    </div>
                </section>
            </div>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/mobility-selection.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LMN tool � Welcome</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <header class="header" role="banner">
        <h1 class="welcome-title">Welcome to the LMN Tool!</h1>
        <p class="welcome-subtitle">A tool that allows stakeholders to design and optimize their neighborhoods</p>
    </header>

    <main class="container" role="main">
        <section class="parameters-section" style="padding-top: 2rem; text-align: center;">
            <div class="parameter-group" style="margin-bottom: 1.5rem;">
                <div class="parameter-label initial-label" style="margin-bottom: 0.75rem;">What do you have in mind?</div>

                <div class="parameter-buttons" role="tablist" aria-label="Initial choice">
                    <button type="button"
                            class="toggle-btn initial-choice initial-btn usage"
                            data-choice="existing"
                            aria-pressed="false">
                        <img class="initial-btn-img" src="Content/Images_ProjectType/Existing Neighborhood.png" alt="Existing Neighborhood" onerror="this.style.display='none'">
                        <span>Existing Neighborhood</span>
                    </button>

                    <button type="button"
                            class="toggle-btn initial-choice initial-btn usage"
                            data-choice="new"
                            aria-pressed="false">
                        <img class="initial-btn-img" src="Content/Images_ProjectType/New Neighborhood.png" alt="New Neighborhood" onerror="this.style.display='none'">
                        <span>New Neighborhood</span>
                    </button>
                </div>
            </div>

            <div class="submit-section">
                <button id="get-started-btn" class="submit-btn" type="button">Get Started</button>
            </div>
        </section>
    </main>

    <script>(function () {
            const choices = document.querySelectorAll('.initial-choice');
            const getStarted = document.getElementById('get-started-btn');
            let selected = null;

            function updateSelection(target) {
                choices.forEach(btn => {
                    const isTarget = btn === target;
                    btn.classList.toggle('active', isTarget);
                    btn.setAttribute('aria-pressed', isTarget ? 'true' : 'false');
                });
                selected = target ? target.dataset.choice : null;
            }

            choices.forEach(btn => {
                btn.addEventListener('click', () => updateSelection(btn));
                btn.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); updateSelection(btn); }
                });
            });

            getStarted.addEventListener('click', () => {
                // Navigate only when "New Neighborhood" is selected.
                if (selected === 'new') {
                    window.location.href = 'layer1_NUs_selection.html';
                }
                // If "new" is selected, intentionally do nothing per spec.
            });
        })();</script>
</body>
</html>

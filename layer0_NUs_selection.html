<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LMN tool: Design positive-energy district neighbourhoods">
  <title>LMN tool: Design positive-energy district neighbourhoods</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <h1>Layer 0: Neighbourhood Selection</h1>
    <p>Select parameters below to begin your design.</p>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Parameters Section -->
    <section class="parameters-section">

      <!-- FUNCTION - With Images -->
      <div class="parameter-group">
        <div class="parameter-label">Function</div>
        <div class="usage-cards">
          <button class="usage-card" data-category="usage" data-value="residential">
            <img src="Content/Images_Usage_Parameters/residential.png" alt="Residential">
            <span>residential</span>
          </button>
          <button class="usage-card" data-category="usage" data-value="commercial">
            <img src="Content/Images_Usage_Parameters/commercial.png" alt="Commercial">
            <span>commercial</span>
          </button>
          <button class="usage-card" data-category="usage" data-value="mixed-use">
            <img src="Content/Images_Usage_Parameters/mixed-use.png" alt="Mixed-use">
            <span>mixed-use</span>
          </button>
          <button class="usage-card" data-category="usage" data-value="industrial">
            <img src="Content/Images_Usage_Parameters/industrial.png" alt="Industrial">
            <span>industrial</span>
          </button>
        </div>
      </div>

      <!-- CONTEXT - With Images -->
      <div class="parameter-group">
        <div class="parameter-label">Context</div>
        <div class="context-cards">
          <button class="context-card" data-category="context" data-value="urban">
            <img src="Content/Images_Context_Parameters/urban.png" alt="Urban">
            <span>urban</span>
          </button>
          <button class="context-card" data-category="context" data-value="suburban">
            <img src="Content/Images_Context_Parameters/suburban.png" alt="Suburban">
            <span>suburban</span>
          </button>
          <button class="context-card" data-category="context" data-value="rural">
            <img src="Content/Images_Context_Parameters/rural.png" alt="Rural">
            <span>rural</span>
          </button>
        </div>
      </div>

      <!-- DENSITY - With Images -->
      <div class="parameter-group">
        <div class="parameter-label">Density</div>
        <div class="density-cards">
          <button class="density-card" data-category="density" data-value="high">
            <img src="Content/Images_Density_Parameters/high.png" alt="High">
            <span>high</span>
          </button>
          <button class="density-card" data-category="density" data-value="medium">
            <img src="Content/Images_Density_Parameters/medium.png" alt="Medium">
            <span>medium</span>
          </button>
          <button class="density-card" data-category="density" data-value="low">
            <img src="Content/Images_Density_Parameters/low.png" alt="Low">
            <span>low</span>
          </button>
        </div>
      </div>

      <!-- LAYOUT - With Images -->
      <div class="parameter-group">
        <div class="parameter-label">Layout</div>
        <div class="layout-cards">
          <button class="layout-card" data-category="layout" data-value="grid">
            <img src="Content/Images_Layout_Parameters/Grid.png" alt="Grid">
            <span>grid</span>
          </button>
          <button class="layout-card" data-category="layout" data-value="curvilinear">
            <img src="Content/Images_Layout_Parameters/Curvilinear.png" alt="Curvilinear">
            <span>curvilinear</span>
          </button>
          <button class="layout-card" data-category="layout" data-value="superblock">
            <img src="Content/Images_Layout_Parameters/Superblock.png" alt="Superblock">
            <span>superblock</span>
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="submit-section">
        <button id="view-results-btn" class="submit-btn" disabled>View Neighbourhoods</button>
      </div>

      <!-- Results Table (Initially Hidden) -->
      <div id="results-section" class="results-section" style="display: none; margin-top: var(--spacing-xl);">
        <h2 style="text-align: center; margin-bottom: var(--spacing-lg);">Compatible Neighbourhoods</h2>
        <div class="table-container">
          <table class="results-table">
            <thead>
              <tr>
                <th>Concepts</th>
                <th>Neighbourhoods</th>
                <th>Properties</th>
                <th>Buildings</th>
              </tr>
            </thead>
            <tbody id="results-body">
              <!-- Results will be dynamically inserted here by app.js -->
            </tbody>
          </table>
        </div>
      </div>

    </section>
  </main>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

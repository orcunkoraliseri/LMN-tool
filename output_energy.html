<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Redirect to the energy-selection page
        const params = new URLSearchParams(window.location.search);
        const neighbourhoodCode = params.get('neighbourhood');

        if (neighbourhoodCode) {
            window.location.replace(`energy.html?neighbourhood=${encodeURIComponent(neighbourhoodCode)}`);
        } else {
            window.location.replace('output.html');
        }
    </script>
</head>

<body>
    <p>Redirecting to the new layout...</p>
</body>

</html>

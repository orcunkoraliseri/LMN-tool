<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Select energy parameters for neighbourhood energy analysis.">
    <title>Energy Selection | Neighbourhood Design Interface</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Main Content -->
    <main class="container">
        <!-- Navigation Back Button -->
        <a id="back-btn" href="layer2_energy_selection.html" class="back-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Layer 2 Selection
        </a>

        <div class="sidebar-layout">
            <aside id="sidebar" class="sidebar"></aside>

            <div id="visual-content" class="main-content">
                <!-- Header -->
                <header class="header">
                    <h1 id="neighbourhood-title">Layer 2: Energy Selection Results</h1>
                    <p>Confirm your energy and generation parameters before proceeding to detailed analysis.</p>
                </header>

                <!-- Parameters Section Removed for Output Table -->
                <div class="table-container">
                    <table class="results-table energy-results-table">
                        <thead>
                            <tr>
                                <th>Concepts</th>
                                <th>Neighbourhoods</th>
                                <th>Properties</th>
                                <th>Buildings</th>
                                <th>Energy</th>
                                <th>Energy Generation</th>
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            <!-- Results will be dynamically inserted here by output_energy.js -->
                        </tbody>
                    </table>
                </div>
                <!-- Submit Button -->
                <div class="submit-section">
                    <button id="proceed-mobility-btn" class="submit-btn">Proceed to Layer 3: Mobility Selection</button>
                </div>
            </div>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/output_energy.js"></script>
</body>

</html>
